<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marhaba Mahal — Kitchen Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --green: #1a6b3c;
    --green-mid: #2e8b57;
    --green-light: #d6f0e0;
    --red: #c0392b;
    --red-light: #fde8e8;
    --amber: #d4860a;
    --amber-light: #fff3cd;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* Flash overlay */
  #flash-overlay {
    position: fixed; inset: 0;
    background: rgba(192, 57, 43, 0.25);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 999;
  }
  #flash-overlay.active { opacity: 1; }

  /* Header */
  .header {
    background: var(--green);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .brand { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80;
    animation: blink 2s infinite;
  }
  .live-dot.alert { background: #f87171; animation: blink 0.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .clock { font-family: 'IBM Plex Mono', monospace; font-size: 14px; opacity: 0.85; }
  .pending-badge {
    background: #f87171; color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    display: none;
  }
  .pending-badge.show { display: block; }

  /* Status bar */
  .status-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; }
  .stat-num.green { color: #4ade80; }
  .stat-num.amber { color: #fbbf24; }
  .stat-num.red { color: #f87171; }
  .refresh-info { margin-left: auto; }

  /* Main grid */
  .main {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    align-items: start;
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .empty p { font-size: 13px; }

  /* Order card */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .order-card.new-order {
    border-color: #f87171;
    animation: card-flash 0.5s ease-in-out 4;
  }
  @keyframes card-flash {
    0%,100% { border-color: #f87171; background: var(--surface); }
    50% { border-color: #fca5a5; background: #2a1515; }
  }

  .card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .order-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #4ade80;
  }
  .new-badge {
    background: #f87171;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    animation: blink 0.5s infinite;
  }
  .type-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .type-delivery { background: #1e3a5f; color: #60a5fa; }
  .type-takeaway { background: #2d1b4e; color: #c084fc; }

  .card-body { padding: 14px 16px; }

  .customer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .customer-name { font-size: 15px; font-weight: 600; }
  .time-ago { font-size: 11px; color: #fbbf24; font-family: 'IBM Plex Mono', monospace; }

  .phone { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
  .address {
    font-size: 12px; color: #93c5fd;
    margin-bottom: 10px;
    display: flex; align-items: flex-start; gap: 4px;
  }

  .divider { height: 1px; background: var(--border); margin: 10px 0; }

  .items-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .items-list { display: flex; flex-direction: column; gap: 3px; }
  .item-row { font-size: 13px; color: var(--text); display: flex; gap: 8px; }
  .item-qty { color: #fbbf24; font-weight: 600; min-width: 24px; font-family: 'IBM Plex Mono', monospace; }

  .notes-row {
    margin-top: 8px;
    background: #2a2000;
    border-left: 3px solid #fbbf24;
    border-radius: 0 6px 6px 0;
    padding: 6px 10px;
    font-size: 12px;
    color: #fde68a;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .total-label { font-size: 12px; color: var(--muted); }
  .total-amount { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: #4ade80; }

  .card-actions { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn {
    border: none; border-radius: 8px;
    padding: 10px 0; font-size: 13px; font-weight: 600;
    cursor: pointer; flex: 1; transition: all 0.15s;
    font-family: 'IBM Plex Sans', sans-serif;
    letter-spacing: 0.02em;
  }
  .btn-approve { background: #166534; color: #4ade80; }
  .btn-approve:hover { background: #15803d; }
  .btn-approve:active { transform: scale(0.97); }
  .btn-reject { background: #7f1d1d; color: #fca5a5; }
  .btn-reject:hover { background: #991b1b; }
  .btn-reject:active { transform: scale(0.97); }

  /* Approved state */
  .order-card.approved { opacity: 0.45; border-color: #166534; }
  .order-card.rejected { opacity: 0.35; border-color: #7f1d1d; }

  /* Loading */
  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 14px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="flash-overlay"></div>

<div class="header">
  <div class="header-left">
    <div class="live-dot" id="liveDot"></div>
    <span class="brand">Marhaba Mahal — Kitchen Display</span>
  </div>
  <div class="header-right">
    <span id="pendingBadge" class="pending-badge"></span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<div class="status-bar">
  <div class="stat">
    <span class="stat-num amber" id="statPending">0</span>
    <span>Pending</span>
  </div>
  <div class="stat">
    <span class="stat-num green" id="statApproved">0</span>
    <span>Approved today</span>
  </div>
  <div class="stat">
    <span class="stat-num red" id="statRejected">0</span>
    <span>Rejected</span>
  </div>
  <div class="stat refresh-info" id="lastRefresh">Connecting...</div>
</div>

<div class="main" id="ordersGrid">
  <div class="loading">Connecting to Google Sheet...</div>
</div>

<script>
const SHEET_ID = "1WeefV9wndjl9HP9B2iVGyrFi91qOzdOI9vYCLyAJcYg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Orders`;

// GOOGLE APPS SCRIPT URL — paste yours here after deploying
// See instructions at bottom of this file
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzV9K1kViRbdFtvyJUsTuyPfq3s8qjFAzuyjphqzJS4_84GfIa3khW3QWD5QTpWFvFxaQ/exec";

let knownOrderIds = new Set();
let allOrders = [];
let isFirstLoad = true;

function getCellValue(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return "";
  return String(cell.v);
}

async function fetchOrders() {
  try {
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    const rows = json.table.rows;

    const orders = rows
      .map(row => ({
        id:        getCellValue(row.c[0]),
        name:      getCellValue(row.c[1]),
        phone:     getCellValue(row.c[2]),
        type:      getCellValue(row.c[3]),
        address:   getCellValue(row.c[4]),
        items:     getCellValue(row.c[5]),
        status:    getCellValue(row.c[6]),
        timestamp: getCellValue(row.c[7]),
        total:     getCellValue(row.c[8]),
        notes:     getCellValue(row.c[9]),
      }))
      .filter(o => o.id && o.name);

    const newOrders = orders.filter(o =>
      o.status === "PENDING" && !knownOrderIds.has(o.id)
    );

    if (!isFirstLoad && newOrders.length > 0) {
      triggerAlert(newOrders.length);
    }

    orders.forEach(o => knownOrderIds.add(o.id));
    allOrders = orders;
    isFirstLoad = false;

    renderOrders(orders);
    updateStats(orders);

    document.getElementById("lastRefresh").textContent =
      "Last updated: " + new Date().toLocaleTimeString("en-PK");

  } catch (err) {
    document.getElementById("lastRefresh").textContent = "Error refreshing — retrying...";
  }
}

function timeAgo(tsStr) {
  if (!tsStr) return "";
  try {
    const match = tsStr.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
    if (!match) return "";
    const d = new Date(+match[1], +match[2], +match[3], +match[4], +match[5], +match[6]);
    const secs = Math.floor((Date.now() - d.getTime()) / 1000);
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.floor(secs / 60) + "m ago";
    return Math.floor(secs / 3600) + "h ago";
  } catch { return ""; }
}

function parseItems(itemsStr) {
  if (!itemsStr) return [];
  return itemsStr.split(",").map(i => i.trim()).filter(Boolean);
}

function renderOrders(orders) {
  const grid = document.getElementById("ordersGrid");

  // Sort: PENDING first, then by most recent
  const sorted = [...orders].sort((a, b) => {
    if (a.status === "PENDING" && b.status !== "PENDING") return -1;
    if (b.status === "PENDING" && a.status !== "PENDING") return 1;
    return 0;
  });

  const pending = sorted.filter(o => o.status === "PENDING");
  const rest = sorted.filter(o => o.status !== "PENDING");
  const display = [...pending, ...rest].slice(0, 20);

  if (display.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✓</div>
        <h2>All caught up</h2>
        <p>No pending orders right now. Refreshing every 10 seconds.</p>
      </div>`;
    return;
  }

  grid.innerHTML = display.map(o => {
    const isNew = o.status === "PENDING" && !knownOrderIds.has(o.id + "_seen");
    const items = parseItems(o.items);
    const cardClass = o.status === "APPROVED" ? "approved" :
                      o.status === "REJECTED" ? "rejected" :
                      isNew ? "new-order" : "";

    return `
    <div class="order-card ${cardClass}" id="card-${o.id}">
      <div class="card-header">
        <span class="order-id">#${o.id}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          ${o.status === "PENDING" ? '<span class="new-badge">NEW</span>' : ""}
          <span class="type-badge ${o.type === "Delivery" ? "type-delivery" : "type-takeaway"}">${o.type || "Takeaway"}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="customer-row">
          <span class="customer-name">${o.name}</span>
          <span class="time-ago">${timeAgo(o.timestamp)}</span>
        </div>
        <div class="phone">${o.phone}</div>
        ${o.address ? `<div class="address">📍 ${o.address}</div>` : ""}
        <div class="divider"></div>
        <div class="items-label">Order</div>
        <div class="items-list">
          ${items.map(item => {
            const parts = item.match(/^(\d+x?\s*)(.*)/i);
            return parts
              ? `<div class="item-row"><span class="item-qty">${parts[1].trim()}</span><span>${parts[2]}</span></div>`
              : `<div class="item-row"><span>${item}</span></div>`;
          }).join("")}
        </div>
        ${o.notes ? `<div class="notes-row">Note: ${o.notes}</div>` : ""}
        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-amount">PKR ${Number(o.total || 0).toLocaleString()}</span>
        </div>
      </div>
      ${o.status === "PENDING" ? `
      <div class="card-actions">
        <button class="btn btn-approve" onclick="updateStatus('${o.id}', 'APPROVED', this)">Approve</button>
        <button class="btn btn-reject" onclick="updateStatus('${o.id}', 'REJECTED', this)">Reject</button>
      </div>` : `
      <div class="card-actions" style="justify-content:center;">
        <span style="font-size:12px;color:${o.status === 'APPROVED' ? '#4ade80' : '#f87171'};">
          ${o.status === "APPROVED" ? "Order Approved" : "Order Rejected"}
        </span>
      </div>`}
    </div>`;
  }).join("");
}

function updateStats(orders) {
  const pending = orders.filter(o => o.status === "PENDING").length;
  const approved = orders.filter(o => o.status === "APPROVED").length;
  const rejected = orders.filter(o => o.status === "REJECTED").length;

  document.getElementById("statPending").textContent = pending;
  document.getElementById("statApproved").textContent = approved;
  document.getElementById("statRejected").textContent = rejected;

  const badge = document.getElementById("pendingBadge");
  if (pending > 0) {
    badge.textContent = pending + " pending";
    badge.classList.add("show");
    document.getElementById("liveDot").classList.add("alert");
  } else {
    badge.classList.remove("show");
    document.getElementById("liveDot").classList.remove("alert");
  }
}

async function updateStatus(orderId, newStatus, btn) {
  btn.disabled = true;
  btn.textContent = "Updating...";

  if (APPS_SCRIPT_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    alert("To enable Approve/Reject, please add the Google Apps Script URL.\nFor now, open the Google Sheet and update the Status column manually.");
    btn.disabled = false;
    btn.textContent = newStatus === "APPROVED" ? "Approve" : "Reject";
    return;
  }

  try {
    await fetch(`${APPS_SCRIPT_URL}?orderId=${orderId}&status=${newStatus}`);
    const card = document.getElementById("card-" + orderId);
    if (card) card.classList.add(newStatus === "APPROVED" ? "approved" : "rejected");
    setTimeout(fetchOrders, 1500);
  } catch {
    alert("Could not update — please update the sheet manually.");
    btn.disabled = false;
  }
}

function triggerAlert(count) {
  // Flash screen
  const overlay = document.getElementById("flash-overlay");
  let flashes = 0;
  const flashInterval = setInterval(() => {
    overlay.classList.toggle("active");
    flashes++;
    if (flashes >= 8) { clearInterval(flashInterval); overlay.classList.remove("active"); }
  }, 250);

  // Beep sound
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "square";
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.4 + 0.3);
      osc.start(ctx.currentTime + i * 0.4);
      osc.stop(ctx.currentTime + i * 0.4 + 0.35);
    }
  } catch(e) {}
}

function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-PK", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

// Init
fetchOrders();
setInterval(fetchOrders, 10000);
setInterval(updateClock, 1000);
updateClock();
</script>

-->
</body>
</html>
