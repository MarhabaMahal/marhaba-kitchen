<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marhaba Mahal — Kitchen Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a0505;--surface:#2a0c0c;--surface2:#331010;--surface3:#3d1414;--border:rgba(201,168,76,0.15);--border-mid:rgba(201,168,76,0.30);--border-bright:rgba(201,168,76,0.55);--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a5e28;--gold-pale:#f0dfa0;--text:#f5e6c8;--muted:#9a7a6a;--green:#2ecc71;--red:#e74c3c;--red-dim:#4a1010;--blue:#5b9bd5;--blue-dim:#0f2035;--purple:#c084fc;--purple-dim:#2a1040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
.bg-glow{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(140px);animation:drift 20s ease-in-out infinite alternate;}
.bg-glow-1{width:700px;height:700px;background:rgba(139,26,26,0.55);top:-300px;left:-200px;}
.bg-glow-2{width:500px;height:500px;background:rgba(201,168,76,0.08);bottom:-200px;right:-100px;animation-delay:-10s;}
.bg-glow-3{width:400px;height:400px;background:rgba(100,10,10,0.4);top:50%;left:50%;margin-left:-200px;margin-top:-200px;animation-delay:-5s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(30px,20px) scale(1.1);}}
#flash-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(201,168,76,0.25) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.08s;z-index:9998;}
#flash-overlay.active{opacity:1;}
#busy-overlay{position:fixed;inset:0;background:rgba(26,5,5,0.97);backdrop-filter:blur(20px);z-index:9997;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#busy-overlay.show{display:flex;}
#busy-overlay .busy-icon{font-size:72px;animation:pulse-scale 1.5s ease-in-out infinite;}
@keyframes pulse-scale{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
#busy-overlay h1{font-family:"Cinzel",serif;font-size:40px;font-weight:700;color:var(--gold);letter-spacing:0.1em;text-shadow:0 0 40px rgba(201,168,76,0.5);}
#busy-overlay p{font-size:15px;color:var(--muted);max-width:340px;text-align:center;line-height:1.7;}
#busy-overlay .close-busy{margin-top:12px;background:transparent;border:1.5px solid var(--border-mid);color:var(--gold);padding:12px 40px;border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.25s;}
#busy-overlay .close-busy:hover{background:var(--gold);color:var(--bg);}
.header{position:sticky;top:0;z-index:200;height:70px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(90,14,14,0.98) 0%,rgba(50,8,8,0.98) 100%);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 4px 32px rgba(0,0,0,0.6);}
.header::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-light),var(--gold),var(--gold-dim),transparent);}
.header::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent);opacity:0.6;}
.header-left{display:flex;align-items:center;gap:14px;}
.logo-wrap{width:44px;height:44px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 10px rgba(201,168,76,0.6));}
.logo-wrap img{width:44px;height:44px;object-fit:contain;}
.brand{font-family:"Cinzel",serif;font-size:16px;font-weight:700;letter-spacing:0.08em;background:linear-gradient(135deg,var(--gold-pale),var(--gold),var(--gold-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:9px;color:var(--gold-dim);letter-spacing:0.18em;text-transform:uppercase;margin-top:1px;opacity:0.8;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse-dot 2.5s ease-in-out infinite;}
.live-dot.alert{background:var(--gold);box-shadow:0 0 12px var(--gold);animation:pulse-dot 0.4s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}
.header-right{display:flex;align-items:center;gap:10px;}
.clock{font-family:"DM Mono",monospace;font-size:14px;color:var(--gold);letter-spacing:0.06em;text-shadow:0 0 10px rgba(201,168,76,0.4);}
.pending-badge{background:linear-gradient(135deg,#5a0e0e,#8b1a1a);color:var(--gold-pale);font-size:11px;font-weight:700;padding:3px 12px;border-radius:2px;display:none;letter-spacing:0.06em;border:1px solid rgba(201,168,76,0.3);}
.pending-badge.show{display:block;}
.busy-btn{display:flex;align-items:center;gap:8px;background:rgba(201,168,76,0.08);border:1px solid var(--border-mid);color:var(--gold);padding:7px 16px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.2s;}
.busy-btn:hover{background:rgba(201,168,76,0.15);border-color:var(--border-bright);}
.busy-btn.busy-on{background:rgba(165,32,32,0.3);border-color:rgba(231,76,60,0.5);color:var(--red);}
.busy-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);transition:all 0.2s;}
.busy-btn.busy-on .dot{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-dot 0.5s infinite;}
.status-bar{position:relative;z-index:1;background:linear-gradient(135deg,rgba(42,12,12,0.98),rgba(51,16,16,0.98));border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;}
.stat{display:flex;align-items:center;gap:10px;padding:0 24px;height:100%;border-right:1px solid var(--border);}
.stat:first-child{padding-left:0;}
.stat-num{font-family:"DM Mono",monospace;font-weight:500;font-size:22px;}
.stat-num.gold{color:var(--gold);text-shadow:0 0 12px rgba(201,168,76,0.5);}
.stat-num.green{color:var(--green);text-shadow:0 0 12px rgba(46,204,113,0.4);}
.stat-num.red{color:var(--red);text-shadow:0 0 12px rgba(231,76,60,0.4);}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.tab-indicator{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
.tab-name{color:var(--gold);}
.refresh-info{font-size:10px;color:var(--muted);padding-left:20px;}
.main{position:relative;z-index:1;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;}
.split-pane{position:relative;padding:20px 22px 40px;min-height:calc(100vh - 140px);}
.pane-delivery{border-right:2px solid var(--border);}
.split-pane::before{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:min(9vw,110px);font-weight:900;letter-spacing:0.12em;opacity:0.045;pointer-events:none;z-index:0;text-transform:uppercase;white-space:nowrap;}
.pane-delivery::before{content:"DELIVERY";color:#4da3ff;}
.pane-takeaway::before{content:"TAKEAWAY";color:var(--gold);}
.pane-cards{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start;margin-top:12px;}
@media(max-width:1100px){.main{grid-template-columns:1fr;}.pane-delivery{border-right:none;border-bottom:2px solid var(--border);}.split-pane{min-height:0;}}
.empty{grid-column:1/-1;text-align:center;padding:100px 20px;}
.empty-icon{font-size:52px;margin-bottom:20px;opacity:0.2;}
.empty h2{font-family:"Cinzel",serif;font-size:18px;font-weight:400;margin-bottom:10px;color:var(--gold);opacity:0.5;letter-spacing:0.08em;}
.empty p{font-size:13px;color:var(--muted);}
.order-card{background:linear-gradient(160deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;transition:transform 0.2s ease,box-shadow 0.2s ease;animation:card-enter 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes card-enter{0%{opacity:0;transform:translateY(20px) scale(0.97);}100%{opacity:1;transform:translateY(0) scale(1);}}
.order-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent);opacity:0;transition:opacity 0.3s;}
.order-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.6),0 0 0 1px var(--border-mid);}
.order-card:hover::before{opacity:1;}
.order-card.new-order{border-color:rgba(201,168,76,0.4);}
.order-card.new-order::before{opacity:1;}
.order-card.approved{opacity:0.38;filter:saturate(0.5);}
.order-card.rejected{opacity:0.28;filter:saturate(0.3);}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(90,14,14,0.6),rgba(61,20,20,0.4));}
.order-id{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--gold);letter-spacing:0.08em;}
.badges{display:flex;align-items:center;gap:6px;}
.new-badge{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--bg);font-size:9px;font-weight:800;padding:2px 9px;border-radius:2px;letter-spacing:0.12em;text-transform:uppercase;animation:badge-blink 0.8s ease-in-out infinite;box-shadow:0 0 12px rgba(201,168,76,0.4);}
@keyframes badge-blink{0%,100%{opacity:1;}50%{opacity:0.5;}}
.returning-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:3px;background:linear-gradient(135deg,#1e3a5f,#5b9bd5);color:#fff;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(91,155,213,0.6);box-shadow:0 0 12px rgba(91,155,213,0.5);animation:badge-glow-blue 2s ease-in-out infinite;}
@keyframes badge-glow-blue{0%,100%{box-shadow:0 0 8px rgba(91,155,213,0.4);}50%{box-shadow:0 0 18px rgba(91,155,213,0.7);}}
.first-time-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:3px;background:linear-gradient(135deg,#5a0e0e,#c0392b);color:#fff;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(231,76,60,0.6);box-shadow:0 0 12px rgba(231,76,60,0.5);animation:badge-glow-red 2s ease-in-out infinite;}
@keyframes badge-glow-red{0%,100%{box-shadow:0 0 8px rgba(231,76,60,0.4);}50%{box-shadow:0 0 18px rgba(231,76,60,0.7);}}
.type-badge{font-size:9px;font-weight:700;padding:3px 10px;border-radius:2px;letter-spacing:0.08em;text-transform:uppercase;}
.type-delivery{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,155,213,0.2);}
.type-takeaway{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(192,132,252,0.2);}
.card-body{padding:14px 16px;}
.customer-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;}
.customer-name{font-size:15px;font-weight:600;color:var(--text);}
.time-stamp{font-size:11px;font-family:"DM Mono",monospace;color:var(--gold);background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);padding:3px 9px;border-radius:3px;white-space:nowrap;font-weight:500;letter-spacing:0.02em;}
.phone{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:"DM Mono",monospace;}
.address{font-size:12px;color:var(--blue);margin-bottom:10px;display:flex;align-items:flex-start;gap:6px;line-height:1.5;background:var(--blue-dim);border:1px solid rgba(91,155,213,0.15);padding:6px 10px;border-radius:4px;}
.divider{height:1px;margin:10px -16px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
.items-label{font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:8px;}
.items-list{display:flex;flex-direction:column;gap:4px;}
.item-row{font-size:13px;color:var(--text);display:flex;gap:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.item-row:last-child{border-bottom:none;}
.item-qty{color:var(--gold);font-weight:600;min-width:28px;font-family:"DM Mono",monospace;font-size:12px;}
.notes-row{margin-top:10px;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:7px 10px;font-size:12px;color:var(--gold-pale);line-height:1.5;}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.total-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.total-amount{font-family:"DM Mono",monospace;font-size:17px;font-weight:500;color:var(--gold);text-shadow:0 0 12px rgba(201,168,76,0.4);}
.card-actions{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:rgba(90,14,14,0.25);}
.btn{border:none;border-radius:3px;padding:10px 0;font-size:11px;font-weight:700;cursor:pointer;flex:1;letter-spacing:0.1em;text-transform:uppercase;position:relative;overflow:hidden;transition:all 0.2s ease;}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.12) 50%,transparent 60%);transform:translateX(-100%);transition:transform 0.4s ease;}
.btn:hover::after{transform:translateX(100%);}
.btn-approve{background:linear-gradient(135deg,#0d2b18,#144d28);color:#2ecc71;border:1px solid rgba(46,204,113,0.25);}
.btn-approve:hover{background:linear-gradient(135deg,#144d28,#1a6635);box-shadow:0 0 20px rgba(46,204,113,0.2);}
.btn-approve:active{transform:scale(0.97);}
.btn-reject{background:linear-gradient(135deg,#2a0808,#3d1010);color:var(--red);border:1px solid rgba(231,76,60,0.25);}
.btn-reject:hover{background:linear-gradient(135deg,#3d1010,#4f1515);box-shadow:0 0 20px rgba(231,76,60,0.2);}
.btn-reject:active{transform:scale(0.97);}
.btn-print{background:transparent;color:var(--muted);border:1px solid var(--border);flex:0 0 auto;padding:10px 14px;}
.btn-print:hover{border-color:var(--border-mid);color:var(--gold);}
.status-stamp{flex:1;text-align:center;padding:10px 0;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;}
.section-header{position:relative;z-index:1;display:flex;align-items:center;gap:10px;padding:14px 6px 6px;font-size:14px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;border-bottom:2px solid var(--border);margin-bottom:4px;}
.section-header .sec-icon{font-size:18px;}
.section-header .sec-count{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:0.06em;color:var(--muted);background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:20px;text-transform:none;}
.sec-delivery{color:#4da3ff;border-bottom-color:rgba(77,163,255,0.35);}
.sec-takeaway{color:var(--gold);border-bottom-color:rgba(212,175,55,0.35);}
.sec-empty{position:relative;z-index:1;color:var(--muted);font-size:12px;padding:18px 6px;font-style:italic;text-align:center;}
.order-card.cancelled{opacity:0.45;border-color:rgba(155,89,182,0.4);}
.order-card.cancelled::before{background:#9b59b6;}
.status-stamp.cancel{color:#9b59b6;background:rgba(155,89,182,0.08);}
.eta-picker{display:none;flex-direction:column;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:rgba(13,43,24,0.35);}
.eta-picker.show{display:flex;}
.eta-picker .eta-title{font-size:10px;color:var(--green);letter-spacing:0.14em;text-transform:uppercase;text-align:center;font-weight:700;}
.eta-picker .eta-row{display:flex;gap:6px;}
.eta-btn{flex:1;background:linear-gradient(135deg,#0d2b18,#144d28);color:#2ecc71;border:1px solid rgba(46,204,113,0.3);border-radius:3px;padding:9px 0;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;}
.eta-btn:hover{background:linear-gradient(135deg,#144d28,#1a6635);box-shadow:0 0 14px rgba(46,204,113,0.25);color:#fff;}
.eta-btn:active{transform:scale(0.96);}
.eta-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:7px 0;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;}
.eta-cancel:hover{color:var(--gold);border-color:var(--border-mid);}
.status-stamp.ok{color:var(--green);}
.status-stamp.fail{color:var(--red);}
#toast-container{position:fixed;bottom:28px;right:28px;z-index:9996;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.toast{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--border-mid);border-left:3px solid var(--gold);padding:12px 18px;border-radius:4px;font-size:13px;color:var(--text);max-width:320px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.toast.success{border-left-color:var(--green);}
.toast.error{border-left-color:var(--red);}
.toast.out{animation:toast-out 0.3s ease both;}
@keyframes toast-in{0%{opacity:0;transform:translateX(20px) scale(0.95);}100%{opacity:1;transform:translateX(0) scale(1);}}
@keyframes toast-out{0%{opacity:1;}100%{opacity:0;transform:translateX(20px);}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
#print-area{display:none;}
.workspace{position:relative;z-index:1;display:flex;align-items:flex-start;}
.workspace .main{flex:1;min-width:0;}
.query-panel{flex:0 0 330px;width:330px;align-self:stretch;border-left:1px solid var(--border);background:linear-gradient(180deg,rgba(42,12,12,0.55),rgba(26,5,5,0.35));min-height:calc(100vh - 122px);display:flex;flex-direction:column;}
.query-head{position:sticky;top:70px;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(90,14,14,0.55),rgba(61,20,20,0.4));backdrop-filter:blur(10px);}
.query-head::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent);opacity:0.6;}
.query-title{font-family:"Cinzel",serif;font-size:12px;font-weight:600;letter-spacing:0.1em;color:var(--gold-light);text-transform:uppercase;}
.query-count{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--gold);background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:11px;padding:2px 11px;min-width:26px;text-align:center;}
.query-count.alert{background:linear-gradient(135deg,#5a0e0e,#8b1a1a);color:var(--gold-pale);border-color:rgba(201,168,76,0.45);animation:badge-blink 1s ease-in-out infinite;}
.query-list{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.query-card{background:linear-gradient(160deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border-mid);border-left:3px solid var(--gold);border-radius:6px;padding:12px 14px;animation:card-enter 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.query-card .q-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px;}
.query-card .q-name{font-size:14px;font-weight:600;color:var(--text);}
.query-card .q-time{font-size:10px;font-family:"DM Mono",monospace;color:var(--gold);white-space:nowrap;padding-top:2px;}
.query-card .q-phone{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);margin-bottom:9px;}
.query-card .q-text{font-size:13px;line-height:1.55;color:var(--gold-pale);background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:4px;padding:8px 10px;white-space:pre-wrap;word-break:break-word;}
.query-card .q-resolve{margin-top:10px;width:100%;padding:7px 10px;font-family:"DM Mono",monospace;font-size:10.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#2ecc71;background:linear-gradient(135deg,#0d2b18,#144d28);border:1px solid rgba(46,204,113,0.25);border-radius:5px;cursor:pointer;transition:background 0.18s ease,box-shadow 0.18s ease,color 0.18s ease,opacity 0.18s ease;}
.query-card .q-resolve:hover{background:linear-gradient(135deg,#144d28,#1a6635);box-shadow:0 0 16px rgba(46,204,113,0.2);color:#fff;}
.query-card .q-resolve:active{transform:scale(0.98);}
.query-card .q-resolve:disabled{opacity:0.55;cursor:default;box-shadow:none;}
.query-empty{text-align:center;color:var(--muted);font-size:12px;padding:48px 16px;line-height:1.7;}
@media (max-width:900px){.workspace{flex-direction:column;}.query-panel{flex:none;width:100%;border-left:none;border-top:1px solid var(--border);min-height:0;}.query-head{position:static;}}
</style>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4C0N_vjaq4uVxbdPoVDRN_HyQDP_3Bb9rBMTQjNRUEsI-mPAWFzk_Z2v4XH8b1rxo/exec";

function showToast(msg, type, duration) {
  type = type || "default";
  duration = duration || 3500;
  var c = document.getElementById("toast-container");
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() {
    t.classList.add("out");
    setTimeout(function() { if(t.parentNode) t.remove(); }, 350);
  }, duration);
}

function getCurrentTab() {
  var k = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Karachi"}));
  return (k.getHours() >= 7 && k.getHours() < 14) ? "Breakfast Menu" : "Dinner Menu";
}

function getCurrentQueryTab() {
  var k = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Karachi"}));
  return (k.getHours() >= 7 && k.getHours() < 14) ? "Breakfast Query" : "Dinner Query";
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

async function fetchQueries() {
  try {
    var sheetId = cachedTodaySheetId || await getTodaySheetId();
    if (!sheetId) { renderQueries([]); return; }
    var tab = getCurrentQueryTab();
    var url = "https://docs.google.com/spreadsheets/d/" + sheetId + "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(tab);
    var res = await fetch(url + "&t=" + Date.now());
    var text = await res.text();
    var json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    if (!json.table || !json.table.rows) { renderQueries([]); return; }
    // Query tab columns:  A = Phone,  B = Name,  C = Inquiry,  D = Timestamp,  E = Status
    var queries = json.table.rows.map(function(row) {
      var c = row.c || [];
      return {
        phone: getCellValue(c[0]),
        name: getCellValue(c[1]),
        inquiry: getCellValue(c[2]),
        timestamp: c[3] || null,
        status: getCellValue(c[4])
      };
    }).filter(function(q) {
      var open = !q.status || /open|pending|new|unresolved/i.test(q.status);
      return (q.name || q.phone || q.inquiry) && open;
    });
    renderQueries(queries);
  } catch(e) {
    // Tab may not exist yet, or sheet not shared — fail quietly with an empty panel.
    renderQueries([]);
  }
}

function renderQueries(queries) {
  currentQueries = queries;
  var list = document.getElementById("queryList");
  var countEl = document.getElementById("queryCount");
  if (countEl) {
    countEl.textContent = queries.length;
    countEl.classList.toggle("alert", queries.length > 0);
  }
  if (!list) return;
  if (!queries.length) {
    list.innerHTML = "<div class='query-empty'>No open queries.<br>The bot is handling everything.</div>";
    return;
  }
  list.innerHTML = queries.slice(0, 50).map(function(q, idx) {
    var ta = q.timestamp ? timeAgo(q.timestamp) : "";
    return "<div class='query-card' id='query-card-" + idx + "'>" +
      "<div class='q-top'><span class='q-name'>" + escapeHtml(q.name || "Unknown") + "</span>" +
      (ta ? "<span class='q-time'>" + ta + " ago</span>" : "") + "</div>" +
      "<div class='q-phone'>" + escapeHtml(q.phone || "\u2014") + "</div>" +
      "<div class='q-text'>" + escapeHtml(q.inquiry || "(no details)") + "</div>" +
      "<button class='q-resolve' onclick='markResolved(" + idx + ", this)'>\u2713 Mark Resolved</button>" +
    "</div>";
  }).join("");
}

function markResolved(idx, btn) {
  var q = currentQueries[idx];
  if (!q) return;
  btn.disabled = true;
  btn.textContent = "\u2713 Resolving\u2026";
  var phone = String(q.phone || "").trim();
  var inquiry = String(q.inquiry || "").trim();
  fetch(APPS_SCRIPT_URL + "?action=resolveQuery&phone=" + encodeURIComponent(phone) + "&inquiry=" + encodeURIComponent(inquiry) + "&_=" + Date.now(), {mode:"no-cors"})
  .then(function() {
    showToast("Query marked resolved", "success");
    var card = document.getElementById("query-card-" + idx);
    if (card) {
      card.style.transition = "opacity 0.4s ease, transform 0.4s ease";
      card.style.opacity = "0";
      card.style.transform = "translateX(24px)";
      setTimeout(function() { if (card && card.parentNode) card.parentNode.removeChild(card); }, 400);
    }
    var countEl = document.getElementById("queryCount");
    if (countEl) {
      var n = Math.max(0, (parseInt(countEl.textContent, 10) || 1) - 1);
      countEl.textContent = n;
      countEl.classList.toggle("alert", n > 0);
    }
    setTimeout(fetchQueries, 1500);
  })
  .catch(function() {
    showToast("Could not resolve \u2014 try again.", "error", 5000);
    btn.disabled = false;
    btn.textContent = "\u2713 Mark Resolved";
  });
}

async function getTodaySheetId() {
  try {
    var res = await fetch(SETTINGS_URL + "&t=" + Date.now());
    var text = await res.text();
    var json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    for (var i = 0; i < json.table.rows.length; i++) {
      var row = json.table.rows[i];
      if (row.c && row.c[0] && row.c[0].v && String(row.c[0].v).trim() === "TodaySheetID" && row.c[1] && row.c[1].v) {
        return String(row.c[1].v).trim();
      }
    }
  } catch(e) {}
  return null;
}

async function checkReturningCustomers(orders) {
  var phones = [];
  orders.forEach(function(o) {
    var p = String(o.phone).trim();
    if (p && phones.indexOf(p) === -1) phones.push(p);
  });
  for (var i = 0; i < phones.length; i++) {
    try {
      var res = await fetch(APPS_SCRIPT_URL + "?action=checkCustomer&phone=" + encodeURIComponent(phones[i]));
      var text = await res.text();
      if (text.trim() === "RETURNING") returningCustomers.add(phones[i]);
    } catch(e) {}
  }
}

if (isBusy) applyBusyUI(true);

function getCellValue(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return "";
  return String(cell.v);
}

async function fetchOrders() {
  try {
    var todaySheetId = await getTodaySheetId();
    if (!todaySheetId) {
      document.getElementById("lastRefresh").textContent = "No daily sheet — check Settings B3";
      return;
    }
    var currentTab = getCurrentTab();
    cachedTodaySheetId = todaySheetId;
    document.getElementById("tabLabel").textContent = currentTab;
    var SHEET_URL = "https://docs.google.com/spreadsheets/d/" + todaySheetId + "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(currentTab);
    var res = await fetch(SHEET_URL + "&t=" + Date.now());
    var text = await res.text();
    var json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    var rows = json.table.rows;
    var orders = rows.map(function(row) {
      return {
        id: getCellValue(row.c[0]), name: getCellValue(row.c[1]),
        phone: getCellValue(row.c[2]), type: getCellValue(row.c[3]),
        address: getCellValue(row.c[4]), items: getCellValue(row.c[5]),
        status: getCellValue(row.c[6]), timestamp: row.c[7],
        total: getCellValue(row.c[8]), notes: getCellValue(row.c[9])
      };
    }).filter(function(o) { return o.id || o.phone || o.items; });
    var newOrders = orders.filter(function(o) { return o.status === "PENDING" && !knownOrderIds.has(o.id); });
    if (!isFirstLoad && newOrders.length > 0) {
      triggerAlert();
      newOrders.forEach(function(o) { showToast("New order from " + o.name, "default", 5000); });
    }
    // Alert kitchen when a pending order gets cancelled by the customer
    if (!isFirstLoad) {
      orders.forEach(function(o) {
        var isCancelledNow = (o.status === "CANCELLED" || o.status === "CANCELED");
        if (isCancelledNow && knownStatuses[o.id] && knownStatuses[o.id] !== "CANCELLED" && knownStatuses[o.id] !== "CANCELED") {
          triggerAlert();
          showToast("\u26a0\ufe0f Order #" + o.id + " (" + o.name + ") CANCELLED by customer \u2014 stop preparing!", "error", 10000);
        }
        // Alert kitchen when the customer EDITS a pending order (items/total changed)
        if (o.status === "PENDING" && knownItems[o.id] !== undefined &&
            (knownItems[o.id] !== o.items || knownTotals[o.id] !== o.total)) {
          triggerAlert();
          showToast("\u270f\ufe0f Order #" + o.id + " (" + o.name + ") UPDATED by customer \u2014 check the new items!", "error", 10000);
        }
      });
    }
    orders.forEach(function(o) {
      knownOrderIds.add(o.id);
      knownStatuses[o.id] = o.status;
      knownItems[o.id] = o.items;
      knownTotals[o.id] = o.total;
    });
    allOrders = orders;
    isFirstLoad = false;
    await checkReturningCustomers(orders);
    renderOrders(orders);
    updateStats(orders);
    document.getElementById("lastRefresh").textContent = "Synced " + new Date().toLocaleTimeString("en-PK");
  } catch(err) {
    document.getElementById("lastRefresh").textContent = "Retrying...";
  }
}

function parseKarachiTimestamp(v) {
  if (v === null || v === undefined) return null;
  var orderDate = null;

  // GViz native Date() format: "Date(2026,5,2,14,30,0)" - already a clean date object representation
  if (typeof v === "string" && v.indexOf("Date(") === 0) {
    var m = v.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
    if (m) {
      // Build Karachi-local time then offset to true UTC
      var karachiLocal = new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
      var browserOffsetMin = karachiLocal.getTimezoneOffset();
      var karachiOffsetMin = -300; // UTC+5
      orderDate = new Date(karachiLocal.getTime() + (browserOffsetMin - karachiOffsetMin) * 60000);
      return orderDate;
    }
  }

  // ISO-style "YYYY-MM-DD HH:MM:SS" from new Apps Script (unambiguous)
  if (typeof v === "string") {
    var iso = v.match(/^(\d{4})-(\d{2})-(\d{2})[\sT](\d{2}):(\d{2}):(\d{2})/);
    if (iso) {
      var karachiLocal = new Date(+iso[1], +iso[2]-1, +iso[3], +iso[4], +iso[5], +iso[6]);
      var browserOffsetMin = karachiLocal.getTimezoneOffset();
      var karachiOffsetMin = -300;
      return new Date(karachiLocal.getTime() + (browserOffsetMin - karachiOffsetMin) * 60000);
    }
  }

  // Legacy en-PK toLocaleString: "DD/MM/YYYY, h:mm:ss am/pm" (older entries from before fix)
  if (typeof v === "string") {
    var pk = v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4}),?\s*(\d{1,2}):(\d{2}):?(\d{2})?\s*(am|pm|AM|PM)?/);
    if (pk) {
      var day   = +pk[1];
      var month = +pk[2] - 1; // JS months are 0-indexed
      var year  = +pk[3];
      var hour  = +pk[4];
      var min   = +pk[5];
      var sec   = pk[6] ? +pk[6] : 0;
      var ampm  = (pk[7] || "").toLowerCase();
      if (ampm === "pm" && hour < 12) hour += 12;
      if (ampm === "am" && hour === 12) hour = 0;
      // These values are in Karachi local time; convert to UTC equivalent
      var karachiLocal = new Date(year, month, day, hour, min, sec);
      var browserOffsetMin = karachiLocal.getTimezoneOffset();
      var karachiOffsetMin = -300;
      orderDate = new Date(karachiLocal.getTime() + (browserOffsetMin - karachiOffsetMin) * 60000);
      return orderDate;
    }
    // Fallback for ISO-like strings
    var asDate = new Date(v);
    if (!isNaN(asDate.getTime())) return asDate;
  }
  return null;
}

function formatTimeShort(tsObj) {
  if (!tsObj || tsObj.v === null || tsObj.v === undefined) return "";
  try {
    var d = parseKarachiTimestamp(tsObj.v);
    if (!d || isNaN(d.getTime())) return "";
    // Show date if order isn't from today, otherwise just time
    var nowKarachi = new Date(new Date().toLocaleString("en-US", {timeZone:"Asia/Karachi"}));
    var orderKarachi = new Date(d.toLocaleString("en-US", {timeZone:"Asia/Karachi"}));
    var sameDay = nowKarachi.getFullYear() === orderKarachi.getFullYear() &&
                  nowKarachi.getMonth()    === orderKarachi.getMonth() &&
                  nowKarachi.getDate()     === orderKarachi.getDate();
    if (sameDay) {
      return d.toLocaleTimeString("en-PK", {hour:"numeric", minute:"2-digit", hour12:true, timeZone:"Asia/Karachi"});
    } else {
      return d.toLocaleString("en-PK", {day:"2-digit", month:"short", hour:"numeric", minute:"2-digit", hour12:true, timeZone:"Asia/Karachi"});
    }
  } catch(e) { return ""; }
}

function timeAgo(tsObj) {
  if (!tsObj || tsObj.v === null || tsObj.v === undefined) return "";
  try {
    var orderDate = parseKarachiTimestamp(tsObj.v);
    if (!orderDate || isNaN(orderDate.getTime())) return "";
    var secs = Math.floor((Date.now() - orderDate.getTime()) / 1000);
    if (secs < 0) secs = 0;
    if (secs < 60) return secs + "s";
    if (secs < 3600) return Math.floor(secs / 60) + "m";
    if (secs < 86400) return Math.floor(secs / 3600) + "h";
    return Math.floor(secs / 86400) + "d";
  } catch(e) { return ""; }
}

function formatTimestamp(tsObj) {
  if (!tsObj || tsObj.v === null || tsObj.v === undefined) return "";
  try {
    var d = parseKarachiTimestamp(tsObj.v);
    if (!d || isNaN(d.getTime())) return "";
    return d.toLocaleString("en-PK", {day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",timeZone:"Asia/Karachi"});
  } catch(e) { return ""; }
}

function parseItems(str) {
  if (!str) return [];
  return str.split(",").map(function(i) { return i.trim(); }).filter(Boolean);
}

function printReceipt(order) {

  }).join("");
  var html = "<!DOCTYPE html><html><head><title>Receipt</title>";

  html += "<h2>MARHABA MAHAL</h2><p style='text-align:center;font-size:11px;color:#666;margin-bottom:16px;'>Authentic Desi Cuisine</p>";
  html += "<div style='display:flex;justify-content:space-between;font-size:12px;margin-bottom:12px;border-bottom:1px dashed #ccc;padding-bottom:8px;'><span><b>#" + order.id + "</b></span><span>" + timestamp + "</span></div>";
  html += "<div style='border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;'><div><b>Customer:</b> " + order.name + "</div><div><b>Phone:</b> " + order.phone + "</div><div><b>Type:</b> " + order.type + "</div>" + (order.address ? "<div><b>Address:</b> " + String(order.address).replace(/(https?:\/\/[^\s|]+)/, "<a href='$1' target='_blank'>Open in Google Maps</a>") + "</div>" : "") + "</div>";
  html += "<table>" + rows + "</table>";
  if (order.notes) html += "<div style='background:#fff8f0;border-left:3px solid #c9a84c;padding:6px 10px;font-size:12px;margin:10px 0;'><b>Note:</b> " + order.notes + "</div>";
  html += "<div style='border-top:2px solid #000;padding-top:10px;display:flex;justify-content:space-between;margin-top:12px;'><span style='font-size:14px;font-weight:600;'>TOTAL</span><span style='font-size:22px;font-weight:700;color:#8b1a1a;'>PKR " + Number(order.total||0).toLocaleString() + "</span></div>";
  html += "<p style='text-align:center;margin-top:16px;font-size:11px;color:#888;'>Shukriya! Thank you for choosing Marhaba Mahal</p>";
  html += "<scr" + "ipt>window.onload=function(){window.print();}</" + "script></body></html>";
  printWin.document.write(html);
  printWin.document.close();
}

function renderOrders(orders) {
  var grid = document.getElementById("ordersGrid");
  var sorted = orders.slice().sort(function(a, b) {
    if (a.status === "PENDING" && b.status !== "PENDING") return -1;
    if (b.status === "PENDING" && a.status !== "PENDING") return 1;
    var aCan = (a.status === "CANCELLED" || a.status === "CANCELED");
    var bCan = (b.status === "CANCELLED" || b.status === "CANCELED");
    if (aCan && !bCan) return 1;
    if (bCan && !aCan) return -1;
    return 0;
  });
  if (sorted.length === 0) {
    grid.innerHTML = "<div class='empty' style='grid-column:1/-1'><div class='empty-icon'>\u2713</div><h2>All Caught Up</h2><p>No orders yet. Refreshing every 10 seconds.</p></div>";
    return;
  }
  function buildOrderCard(o, idx) {
    var html = "";
    var items = parseItems(o.items);
    var cardClass = o.status === "APPROVED" ? "approved" : o.status === "REJECTED" ? "rejected" : (o.status === "CANCELLED" || o.status === "CANCELED") ? "cancelled" : "";
    var isReturning = returningCustomers.has(String(o.phone).trim());
    var ta = formatTimeShort(o.timestamp);
    var itemsHtml = items.map(function(item) {
      var p = item.match(/^(\d+x?\s*)(.*)/i);
      return p
        ? "<div class='item-row'><span class='item-qty'>" + p[1].trim() + "</span><span>" + p[2] + "</span></div>"
        : "<div class='item-row'><span>" + item + "</span></div>";
    }).join("");
    var oid = o.id.replace(/'/g, "");
    var actionsHtml;
    if (o.status === "PENDING") {
      actionsHtml = "<button class='btn btn-approve' onclick=\"showEtaPicker('" + oid + "')\">\u2713 Approve</button>" +
                    "<button class='btn btn-reject' onclick=\"updateStatus('" + oid + "','REJECTED',this)\">\u2717 Reject</button>";
    } else {
      var isCancelled = (o.status === "CANCELLED" || o.status === "CANCELED");
      actionsHtml = "<span class='status-stamp " + (o.status === "APPROVED" ? "ok" : isCancelled ? "cancel" : "fail") + "'>" +
                    (o.status === "APPROVED" ? "\u2713 Approved &amp; Notified" : isCancelled ? "\ud83d\udeab Cancelled by Customer" : "\u2717 Rejected") + "</span>";
    }
    var safeO = JSON.stringify(o).replace(/'/g, "&#39;");
    html += "<div class='order-card " + cardClass + "' id='card-" + o.id + "' style='animation-delay:" + (idx * 0.06) + "s'>";
    html += "<div class='card-header'><span class='order-id'>ORDER #" + o.id + "</span><div class='badges'>";
    if (isReturning) html += "<span class='returning-badge'>\u267b Returning</span>";
    else html += "<span class='first-time-badge'>\u2728 First-Time</span>";
    if (o.status === "PENDING") html += "<span class='new-badge'>New Order</span>";
    html += "<span class='type-badge " + (o.type === "Delivery" ? "type-delivery" : "type-takeaway") + "'>" + (o.type || "Takeaway") + "</span>";
    html += "</div></div><div class='card-body'>";
    html += "<div class='customer-row'><span class='customer-name'>" + o.name + "</span>" + (ta ? "<span class='time-ago'>" + ta + " ago</span>" : "") + "</div>";
    html += "<div class='phone'>" + o.phone + "</div>";
    if (o.address) {
      var mapsMatch = String(o.address).match(/https?:\/\/[^\s|]+/);
      if (mapsMatch) {
        var restText = String(o.address).replace(mapsMatch[0], "").replace(/^\s*\|\s*/, "").replace(/\s*\|\s*$/, "").trim();
        html += "<div class='address'><span>\u{1F4CD}</span><span>" +
                "<a href='" + mapsMatch[0] + "' target='_blank' rel='noopener' style='color:var(--blue);text-decoration:underline;font-weight:600;'>Open in Google Maps</a>" +
                (restText ? " \u2014 " + restText : "") + "</span></div>";
      } else {
        html += "<div class='address'><span>\u{1F4CD}</span><span>" + o.address + "</span></div>";
      }
    }
    html += "<div class='divider'></div><div class='items-label'>Items Ordered</div><div class='items-list'>" + itemsHtml + "</div>";
    if (o.notes) html += "<div class='notes-row'>\u{1F4DD} " + o.notes + "</div>";
    html += "<div class='total-row'><span class='total-label'>Order Total</span><span class='total-amount'>PKR " + Number(o.total||0).toLocaleString() + "</span></div>";
    html += "</div><div class='card-actions'>" + actionsHtml;
    html += "<button class='btn btn-print' onclick='printReceipt(" + safeO + ")' title='Print'>\u{1F5A8}</button>";
    html += "</div>";
    if (o.status === "PENDING") {
      html += "<div class='eta-picker' id='eta-" + oid + "'>";
      html += "<div class='eta-title'>\u23F1 " + (o.type === "Delivery" ? "Estimated Delivery Time" : "Ready For Pickup In") + "</div>";
      html += "<div class='eta-row'>";
      html += "<button class='eta-btn' onclick=\"approveWithEta('" + oid + "','15 min',this)\">15 min</button>";
      html += "<button class='eta-btn' onclick=\"approveWithEta('" + oid + "','20 min',this)\">20 min</button>";
      html += "<button class='eta-btn' onclick=\"approveWithEta('" + oid + "','30 min',this)\">30 min</button>";
      html += "</div><div class='eta-row'>";
      html += "<button class='eta-btn' onclick=\"approveWithEta('" + oid + "','40 min',this)\">40 min</button>";
      html += "<button class='eta-btn' onclick=\"approveWithEta('" + oid + "','1 Hr',this)\">1 Hr</button>";
      html += "</div>";
      html += "<button class='eta-cancel' onclick=\"hideEtaPicker('" + oid + "')\">\u2190 Back</button>";
      html += "</div>";
    }
    html += "</div>";
    return html;
  }

  var deliveryOrders = sorted.filter(function(o) { return (o.type || "").trim() === "Delivery"; });
  var takeawayOrders = sorted.filter(function(o) { return (o.type || "").trim() !== "Delivery"; });
  var dPending = deliveryOrders.filter(function(o){ return o.status === "PENDING"; }).length;
  var tPending = takeawayOrders.filter(function(o){ return o.status === "PENDING"; }).length;

  var idx = 0;
  var dHtml = "<div class='split-pane pane-delivery'>";
  dHtml += "<div class='section-header sec-delivery'><span class='sec-icon'>\u{1F6F5}</span> DELIVERY" +
           "<span class='sec-count'>" + deliveryOrders.length + (dPending ? " \u00b7 " + dPending + " pending" : "") + "</span></div>";
  if (deliveryOrders.length === 0) {
    dHtml += "<div class='sec-empty'>No delivery orders</div>";
  } else {
    dHtml += "<div class='pane-cards'>";
    deliveryOrders.slice(0, 20).forEach(function(o) { dHtml += buildOrderCard(o, idx++); });
    dHtml += "</div>";
  }
  dHtml += "</div>";

  var tHtml = "<div class='split-pane pane-takeaway'>";
  tHtml += "<div class='section-header sec-takeaway'><span class='sec-icon'>\u{1F6CD}\uFE0F</span> TAKEAWAY" +
           "<span class='sec-count'>" + takeawayOrders.length + (tPending ? " \u00b7 " + tPending + " pending" : "") + "</span></div>";
  if (takeawayOrders.length === 0) {
    tHtml += "<div class='sec-empty'>No takeaway orders</div>";
  } else {
    tHtml += "<div class='pane-cards'>";
    takeawayOrders.slice(0, 20).forEach(function(o) { tHtml += buildOrderCard(o, idx++); });
    tHtml += "</div>";
  }
  tHtml += "</div>";

  grid.innerHTML = dHtml + tHtml;
}

function updateStats(orders) {
  var pending  = orders.filter(function(o) { return o.status === "PENDING"; }).length;
  var approved = orders.filter(function(o) { return o.status === "APPROVED"; }).length;
  var rejected = orders.filter(function(o) { return o.status === "REJECTED"; }).length;
  document.getElementById("statPending").textContent  = pending;
  document.getElementById("statApproved").textContent = approved;
  document.getElementById("statRejected").textContent = rejected;
  var badge = document.getElementById("pendingBadge");
  var dot   = document.getElementById("liveDot");
  if (pending > 0) { badge.textContent = pending + " pending"; badge.classList.add("show"); dot.classList.add("alert"); }
  else { badge.classList.remove("show"); dot.classList.remove("alert"); }
}

function showEtaPicker(orderId) {
  var p = document.getElementById("eta-" + orderId);
  if (p) p.classList.add("show");
}

function hideEtaPicker(orderId) {
  var p = document.getElementById("eta-" + orderId);
  if (p) p.classList.remove("show");
}

function approveWithEta(orderId, eta, btn) {
  var picker = document.getElementById("eta-" + orderId);
  if (picker) {
    var btns = picker.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  }
  updateStatus(orderId, "APPROVED", btn, eta);
}

function updateStatus(orderId, newStatus, btn, eta) {
  btn.disabled = true;
  btn.textContent = "Sending...";
  var order = null;
  for (var i = 0; i < allOrders.length; i++) {
    if (allOrders[i].id === orderId) { order = allOrders[i]; break; }
  }
  fetch(APPS_SCRIPT_URL + "?action=updateOrderStatus&orderId=" + encodeURIComponent(orderId) + "&status=" + newStatus + "&tab=" + encodeURIComponent(getCurrentTab()) + "&notify=NO" + (eta ? "&eta=" + encodeURIComponent(eta) : "") + "&_=" + Date.now(), {mode:"no-cors"})
  .then(function() {
    if (!order || !order.phone) return Promise.resolve();
    var phone = String(order.phone).trim();
    var name  = order.name || "Customer";
    var items = order.items || "";
    var total = order.total || "";
    var otype = order.type || "Order";
    var addr  = order.address || "";
    var msg;
    if (newStatus === "APPROVED") {
      msg = "\u2705 *Order Confirmed!*\n\nAssalam o Alaikum " + name + "! \ud83c\udf89\n\n" +
            "Your order has been *confirmed by our kitchen* and is now being prepared.\n\n" +
            "\ud83d\udce6 *Order Details:*\n" + items + "\n\n" +
            "\ud83d\udcb0 *Subtotal:* PKR " + Number(total||0).toLocaleString() +
            "\n\u2139\ufe0f _Service charges, GST & other applicable charges will be added._" +
            (eta ? (otype === "Takeaway" ? "\n\u23F1 *Ready for pickup in:* " + eta : "\n\u23F1 *Estimated time:* " + eta) : "") +
            (otype === "Delivery" && addr ? "\n\ud83d\udccd *Delivery to:* " + addr : "") +
            (otype === "Takeaway" ? "\n\ud83d\udccd *Pickup at:* 204 RB East W Canal Rd, next to Babu Petroleum, Faisalabad\nhttps://maps.app.goo.gl/CP6JnvMYWX6fKyQY9" : "") +
            "\n\nShukria for choosing *Marhaba Mahal!* \ud83c\udf7d\ufe0f";
    } else {
      msg = "\u274c *Order Update*\n\nAssalam o Alaikum " + name + ",\n\n" +
            "We are sorry, but we were unable to process your order at this time.\n\n" +
            "Please call us: \ud83d\udcde *03000208204*\n\nShukriya! \ud83d\ude4f";
    }
    return fetch(APPS_SCRIPT_URL + "?action=sendWhatsApp&phone=" + encodeURIComponent(phone) + "&message=" + encodeURIComponent(msg), {mode:"no-cors"});
  })
  .then(function() {
    // Queue feedback message for 2 hours later (only for APPROVED orders)
    if (newStatus === "APPROVED" && order && order.phone) {
      return fetch(APPS_SCRIPT_URL + "?action=queueFeedback&phone=" + encodeURIComponent(String(order.phone).trim()) + "&name=" + encodeURIComponent(order.name || "Customer"), {mode:"no-cors"});
    }
  })
  .then(function() {
    showToast(
      newStatus === "APPROVED" ? "Order #" + orderId + " approved (" + (eta || "no ETA") + ") \u2014 customer notified" : "Order #" + orderId + " rejected",
      newStatus === "APPROVED" ? "success" : "error"
    );
    var card = document.getElementById("card-" + orderId);
    if (card) {
      card.style.transition = "opacity 0.4s ease, transform 0.4s ease";
      card.style.transform = "scale(0.98)";
      setTimeout(function() {
        card.classList.add(newStatus === "APPROVED" ? "approved" : "rejected");
        card.style.transform = "";
      }, 300);
    }
    setTimeout(fetchOrders, 2000);
  })
  .catch(function() {
    showToast("Could not update \u2014 edit the sheet manually.", "error", 6000);
    btn.disabled = false;
    btn.textContent = newStatus === "APPROVED" ? "Approve" : "Reject";
  });
}

function triggerAlert() {
  // Flash overlay
  var overlay = document.getElementById("flash-overlay");
  var f = 0;
  var iv = setInterval(function() {
    overlay.classList.toggle("active");
    if (++f >= 12) { clearInterval(iv); overlay.classList.remove("active"); }
  }, 180);

  // Loud restaurant-grade alarm: 3 loud bursts of a harsh buzzer tone
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();

    function buzz(startTime, duration) {
      // Main buzzer — harsh square wave at high volume
      var osc1 = ctx.createOscillator();
      var gain1 = ctx.createGain();
      osc1.type = "square";
      osc1.frequency.value = 880;
      gain1.gain.setValueAtTime(0, startTime);
      gain1.gain.linearRampToValueAtTime(1.0, startTime + 0.01);
      gain1.gain.setValueAtTime(1.0, startTime + duration - 0.02);
      gain1.gain.linearRampToValueAtTime(0, startTime + duration);
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.start(startTime);
      osc1.stop(startTime + duration);

      // Second harmonic layer for extra punch
      var osc2 = ctx.createOscillator();
      var gain2 = ctx.createGain();
      osc2.type = "sawtooth";
      osc2.frequency.value = 440;
      gain2.gain.setValueAtTime(0, startTime);
      gain2.gain.linearRampToValueAtTime(0.6, startTime + 0.01);
      gain2.gain.setValueAtTime(0.6, startTime + duration - 0.02);
      gain2.gain.linearRampToValueAtTime(0, startTime + duration);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(startTime);
      osc2.stop(startTime + duration);
    }

    // 4 loud buzzes with short gaps — cuts through kitchen noise
    var now = ctx.currentTime;
    buzz(now + 0.0,  0.25);
    buzz(now + 0.35, 0.25);
    buzz(now + 0.70, 0.25);
    buzz(now + 1.05, 0.5);   // long final buzz

    // Second round after 2 seconds if there are still pending orders
    setTimeout(function() {
      try {
        var ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        var t = ctx2.currentTime;
        buzz(t + 0.0, 0.2);
        buzz(t + 0.3, 0.2);
        buzz(t + 0.6, 0.4);
      } catch(e2) {}
    }, 2200);

  } catch(e) {}
}

function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-PK", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
}

fetchOrders();
setInterval(fetchOrders, 10000);
fetchQueries();
setInterval(fetchQueries, 10000);
setInterval(updateClock, 1000);
updateClock();

</script>
