<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marhaba Mahal — Kitchen Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim:   #7a5e28;
  --emerald:    #1a6b3c;
  --emerald-lit:#22c55e;
  --emerald-dim:#0d3d22;
  --bg:         #080b0a;
  --bg2:        #0d120f;
  --surface:    #111614;
  --surface2:   #171e1a;
  --surface3:   #1e2820;
  --border:     rgba(201,168,76,0.12);
  --border-mid: rgba(201,168,76,0.22);
  --text:       #eee8d5;
  --muted:      #6b7a6e;
  --red:        #e05252;
  --red-dim:    #4a1a1a;
  --blue:       #5b9bd5;
  --blue-dim:   #0f2035;
  --purple:     #a78bfa;
  --purple-dim: #1e1535;
}

*{box-sizing:border-box;margin:0;padding:0;}

/* ── Grain overlay ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Ambient background glow ── */
.bg-glow {
  position: fixed; pointer-events: none; z-index: 0;
  border-radius: 50%; filter: blur(120px); opacity: 0.07;
  animation: drift 18s ease-in-out infinite alternate;
}
.bg-glow-1 { width:600px; height:600px; background:var(--emerald); top:-200px; left:-150px; animation-delay:0s; }
.bg-glow-2 { width:500px; height:500px; background:var(--gold); bottom:-200px; right:-100px; animation-delay:-9s; }
@keyframes drift { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(40px,30px) scale(1.08);} }

/* ── Flash overlay ── */
#flash-overlay {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center, rgba(224,82,82,0.35) 0%, transparent 70%);
  pointer-events:none; opacity:0; transition:opacity 0.08s; z-index:9998;
}
#flash-overlay.active{opacity:1;}

/* ── Busy overlay ── */
#busy-overlay {
  position:fixed; inset:0;
  background:rgba(8,11,10,0.96);
  backdrop-filter:blur(16px);
  z-index:9997; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#busy-overlay.show{display:flex;}
#busy-overlay .busy-icon {
  font-size:72px;
  animation: pulse-scale 1.5s ease-in-out infinite;
}
@keyframes pulse-scale{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
#busy-overlay h1 {
  font-family:'Cinzel',serif; font-size:42px; font-weight:700;
  color:var(--red); letter-spacing:0.08em;
  text-shadow:0 0 40px rgba(224,82,82,0.6);
  animation:pulse-scale 1.5s ease-in-out infinite;
}
#busy-overlay p { font-size:16px; color:var(--muted); max-width:340px; text-align:center; line-height:1.6; }
#busy-overlay .close-busy {
  margin-top:8px;
  background:transparent; border:1.5px solid var(--border-mid);
  color:var(--gold); padding:12px 36px; border-radius:4px;
  font-size:13px; font-weight:600; cursor:pointer;
  font-family:'DM Sans',sans-serif; letter-spacing:0.1em; text-transform:uppercase;
  transition:all 0.25s;
}
#busy-overlay .close-busy:hover {
  background:var(--gold); color:var(--bg);
  box-shadow:0 0 30px rgba(201,168,76,0.4);
}

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:200;
  height:64px; padding:0 28px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(8,11,10,0.85);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.header::after {
  content:''; position:absolute; bottom:0; left:28px; right:28px;
  height:1px; background:linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
  opacity:0.6;
}

.header-left { display:flex; align-items:center; gap:14px; }

.brand-mark {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg, var(--emerald-dim), var(--emerald));
  border:1px solid var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  box-shadow:0 0 16px rgba(26,107,60,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
}

.brand {
  font-family:'Cinzel',serif;
  font-size:15px; font-weight:600;
  letter-spacing:0.06em;
  background:linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.brand-sub { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:1px; }

.live-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--emerald-lit);
  box-shadow:0 0 8px var(--emerald-lit);
  animation:pulse-dot 2.5s ease-in-out infinite;
}
.live-dot.alert {
  background:var(--red);
  box-shadow:0 0 12px var(--red);
  animation:pulse-dot 0.5s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}

.header-right { display:flex; align-items:center; gap:10px; }

.clock {
  font-family:'DM Mono',monospace; font-size:13px;
  color:var(--gold); opacity:0.8; letter-spacing:0.04em;
}

.pending-badge {
  background:var(--red); color:#fff;
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px;
  display:none; letter-spacing:0.04em;
  animation:badge-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.pending-badge.show{display:block;}
@keyframes badge-pop{0%{transform:scale(0);}100%{transform:scale(1);}}

/* Busy button */
.busy-btn {
  display:flex; align-items:center; gap:8px;
  background:transparent;
  border:1px solid var(--border-mid);
  color:var(--text); padding:7px 14px; border-radius:4px;
  font-size:11px; font-weight:600; cursor:pointer;
  font-family:'DM Sans',sans-serif;
  letter-spacing:0.1em; text-transform:uppercase;
  transition:all 0.2s;
}
.busy-btn:hover{border-color:var(--gold);color:var(--gold);}
.busy-btn.busy-on{background:rgba(224,82,82,0.15);border-color:var(--red);color:var(--red);}
.busy-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--emerald-lit);transition:all 0.2s;box-shadow:0 0 6px var(--emerald-lit);}
.busy-btn.busy-on .dot{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-dot 0.5s infinite;}

/* ── STATUS BAR ── */
.status-bar {
  position:relative; z-index:1;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px; height:44px;
  display:flex; align-items:center; gap:0;
  overflow:hidden;
}
.status-bar::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--border-mid), transparent);
}

.stat {
  display:flex; align-items:center; gap:8px;
  padding:0 20px; height:100%;
  border-right:1px solid var(--border);
  position:relative;
}
.stat:first-child{padding-left:0;}
.stat-num {
  font-family:'DM Mono',monospace; font-weight:500; font-size:20px;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.stat-num.green{color:var(--emerald-lit); text-shadow:0 0 12px rgba(34,197,94,0.4);}
.stat-num.amber{color:var(--gold); text-shadow:0 0 12px rgba(201,168,76,0.4);}
.stat-num.red{color:var(--red); text-shadow:0 0 12px rgba(224,82,82,0.4);}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}

.tab-indicator {
  margin-left:auto; display:flex; align-items:center; gap:8px;
  font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
.tab-name{color:var(--gold);}

.refresh-info{font-size:10px;color:var(--muted);letter-spacing:0.04em;padding-left:20px;}

/* ── MAIN GRID ── */
.main {
  position:relative; z-index:1;
  padding:24px 28px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(330px, 1fr));
  gap:18px; align-items:start;
}

.empty {
  grid-column:1/-1; text-align:center; padding:100px 20px; color:var(--muted);
  animation:fade-up 0.6s ease both;
}
.empty-icon{font-size:52px;margin-bottom:20px;opacity:0.25;}
.empty h2{font-family:'Cinzel',serif;font-size:18px;font-weight:400;margin-bottom:10px;color:var(--gold);opacity:0.5;letter-spacing:0.06em;}
.empty p{font-size:13px;opacity:0.6;}

/* ── ORDER CARD ── */
.order-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  position:relative;
  transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.3s;
  animation:card-enter 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes card-enter{
  0%{opacity:0;transform:translateY(20px) scale(0.97);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
.order-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--border-mid);
}

/* Gold accent line top */
.order-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
  opacity:0; transition:opacity 0.3s;
}
.order-card:hover::before, .order-card.new-order::before{opacity:1;}

.order-card.new-order {
  border-color:rgba(224,82,82,0.5);
  animation:card-enter 0.5s cubic-bezier(0.34,1.56,0.64,1) both, new-pulse 1s ease-in-out 4;
}
.order-card.new-order::before{background:linear-gradient(90deg,transparent,rgba(224,82,82,0.6),var(--red),rgba(224,82,82,0.6),transparent);}

@keyframes new-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(224,82,82,0);}
  50%{box-shadow:0 0 0 6px rgba(224,82,82,0.15), 0 0 24px rgba(224,82,82,0.2);}
}

.order-card.approved{
  opacity:0.4; border-color:rgba(26,107,60,0.4);
  filter:saturate(0.6);
}
.order-card.rejected{
  opacity:0.3; border-color:rgba(224,82,82,0.2);
  filter:saturate(0.3);
}

/* Card header */
.card-header {
  padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}

.order-id {
  font-family:'DM Mono',monospace; font-size:12px; font-weight:500;
  color:var(--gold); letter-spacing:0.06em;
}

.badges{display:flex;align-items:center;gap:6px;}

.new-badge {
  background:var(--red); color:#fff;
  font-size:9px; font-weight:700; padding:2px 8px; border-radius:3px;
  letter-spacing:0.1em; text-transform:uppercase;
  animation:badge-blink 0.6s ease-in-out infinite;
  box-shadow:0 0 10px rgba(224,82,82,0.5);
}
@keyframes badge-blink{0%,100%{opacity:1;}50%{opacity:0.5;}}

.returning-badge {
  font-size:9px; font-weight:600; padding:2px 8px; border-radius:3px;
  background:var(--blue-dim); color:var(--blue);
  letter-spacing:0.06em; text-transform:uppercase; border:1px solid rgba(91,155,213,0.2);
}

.type-badge {
  font-size:9px; font-weight:700; padding:3px 10px; border-radius:3px;
  letter-spacing:0.08em; text-transform:uppercase;
}
.type-delivery{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,155,213,0.2);}
.type-takeaway{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,0.2);}

/* Card body */
.card-body{padding:14px 16px;}

.customer-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;}
.customer-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.01em;}
.time-ago{
  font-size:10px; font-family:'DM Mono',monospace;
  color:var(--gold); opacity:0.8;
  background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.15);
  padding:2px 7px; border-radius:3px; white-space:nowrap;
}

.phone{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;letter-spacing:0.04em;}

.address{
  font-size:12px; color:var(--blue); margin-bottom:10px;
  display:flex; align-items:flex-start; gap:6px; line-height:1.5;
  background:var(--blue-dim); border:1px solid rgba(91,155,213,0.15);
  padding:6px 10px; border-radius:4px;
}

.divider{
  height:1px; margin:10px -16px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}

.items-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}

.items-list{display:flex;flex-direction:column;gap:4px;}
.item-row{
  font-size:13px; color:var(--text); display:flex; gap:10px;
  align-items:baseline; padding:3px 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.item-row:last-child{border-bottom:none;}
.item-qty{
  color:var(--gold); font-weight:600; min-width:28px;
  font-family:'DM Mono',monospace; font-size:12px;
}

.notes-row{
  margin-top:10px;
  background:rgba(201,168,76,0.06);
  border:1px solid rgba(201,168,76,0.18);
  border-left:3px solid var(--gold);
  border-radius:0 4px 4px 0;
  padding:7px 10px; font-size:12px; color:rgba(232,201,122,0.85);
  line-height:1.5;
}

.total-row{
  display:flex; justify-content:space-between; align-items:center;
  margin-top:12px; padding-top:10px;
  border-top:1px solid var(--border);
}
.total-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.total-amount{
  font-family:'DM Mono',monospace; font-size:17px; font-weight:500;
  color:var(--emerald-lit);
  text-shadow:0 0 12px rgba(34,197,94,0.35);
}

/* Card actions */
.card-actions{
  display:flex; gap:8px; padding:12px 16px;
  border-top:1px solid var(--border);
  background:var(--surface2);
}

.btn {
  border:none; border-radius:4px; padding:10px 0;
  font-size:12px; font-weight:600; cursor:pointer; flex:1;
  font-family:'DM Sans',sans-serif; letter-spacing:0.08em; text-transform:uppercase;
  position:relative; overflow:hidden;
  transition:all 0.2s ease;
}
/* Shimmer on hover */
.btn::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.1) 50%,transparent 60%);
  transform:translateX(-100%); transition:transform 0.4s ease;
}
.btn:hover::after{transform:translateX(100%);}

.btn-approve{
  background:linear-gradient(135deg,var(--emerald-dim),#1a4a2e);
  color:var(--emerald-lit);
  border:1px solid rgba(34,197,94,0.2);
}
.btn-approve:hover{
  background:linear-gradient(135deg,#1a4a2e,#1e6035);
  box-shadow:0 0 20px rgba(34,197,94,0.25);
  border-color:rgba(34,197,94,0.4);
}
.btn-approve:active{transform:scale(0.97);}

.btn-reject{
  background:linear-gradient(135deg,var(--red-dim),#3a1515);
  color:var(--red);
  border:1px solid rgba(224,82,82,0.2);
}
.btn-reject:hover{
  background:linear-gradient(135deg,#3a1515,#4a1a1a);
  box-shadow:0 0 20px rgba(224,82,82,0.25);
  border-color:rgba(224,82,82,0.4);
}
.btn-reject:active{transform:scale(0.97);}

.btn-print{
  background:transparent; color:var(--muted);
  border:1px solid var(--border); flex:0 0 auto; padding:10px 14px;
}
.btn-print:hover{border-color:var(--border-mid);color:var(--text);}

.status-stamp{
  flex:1; text-align:center; padding:10px 0;
  font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.status-stamp.ok{color:var(--emerald-lit);}
.status-stamp.fail{color:var(--red);}

/* ── TOAST NOTIFICATION ── */
#toast-container{
  position:fixed; bottom:28px; right:28px; z-index:9996;
  display:flex; flex-direction:column; gap:10px; align-items:flex-end;
}
.toast{
  background:var(--surface2);
  border:1px solid var(--border-mid);
  border-left:3px solid var(--gold);
  padding:12px 18px; border-radius:6px;
  font-size:13px; color:var(--text);
  max-width:320px; line-height:1.5;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  animation:toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.toast.success{border-left-color:var(--emerald-lit);}
.toast.error{border-left-color:var(--red);}
.toast.out{animation:toast-out 0.3s ease both;}
@keyframes toast-in{0%{opacity:0;transform:translateX(20px) scale(0.95);}100%{opacity:1;transform:translateX(0) scale(1);}}
@keyframes toast-out{0%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(20px);}}

/* ── ANIMATIONS ── */
@keyframes fade-up{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}

/* ── PRINT ── */
#print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:0;}
}
</style>
</head>
<body>

<!-- Background glows -->
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div id="flash-overlay"></div>
<div id="toast-container"></div>
<div id="print-area"></div>

<!-- Busy Mode Overlay -->
<div id="busy-overlay">
  <div class="busy-icon">🚫</div>
  <h1>KITCHEN IS BUSY</h1>
  <p>New orders are currently paused. Customers are being notified automatically.</p>
  <button class="close-busy" onclick="toggleBusy()">Disable Busy Mode</button>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="live-dot" id="liveDot"></div>
    <div class="brand-mark">🍽️</div>
    <div>
      <div class="brand">Marhaba Mahal</div>
      <div class="brand-sub">Kitchen Command</div>
    </div>
  </div>
  <div class="header-right">
    <span id="pendingBadge" class="pending-badge"></span>
    <button class="busy-btn" id="busyBtn" onclick="toggleBusy()">
      <span class="dot"></span>
      <span id="busyLabel">Open</span>
    </button>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="stat">
    <span class="stat-num amber" id="statPending">0</span>
    <span class="stat-label">Pending</span>
  </div>
  <div class="stat">
    <span class="stat-num green" id="statApproved">0</span>
    <span class="stat-label">Approved</span>
  </div>
  <div class="stat">
    <span class="stat-num red" id="statRejected">0</span>
    <span class="stat-label">Rejected</span>
  </div>
  <div class="tab-indicator" style="margin-left:auto;">
    <span class="tab-dot"></span>
    <span class="tab-name" id="tabLabel">—</span>
  </div>
  <span class="refresh-info" id="lastRefresh">Connecting…</span>
</div>

<!-- Orders grid -->
<div class="main" id="ordersGrid">
  <div class="empty">
    <div class="empty-icon">⏳</div>
    <h2>Connecting</h2>
    <p>Loading orders…</p>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyR-taPgnocZ7g0gCbciCROqTSq1Ef3urHc4e3YZY9xxpG99gop9OQabe8WVBw10V0Y6g/exec";
const SETTINGS_SHEET_ID = "1WeefV9wndjl9HP9B2iVGyrFi91qOzdOI9vYCLyAJcYg";
const SETTINGS_URL = `https://docs.google.com/spreadsheets/d/${SETTINGS_SHEET_ID}/gviz/tq?tqx=out:json&gid=870267070`;

let knownOrderIds = new Set();
let allOrders = [];
let isFirstLoad = true;
let isBusy = localStorage.getItem("kitchenBusy") === "true";
let todaySheetId = null;
let currentTab = null;
let returningCustomers = new Set();

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type = "default", duration = 3500) {
  const container = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => {
    t.classList.add("out");
    setTimeout(() => t.remove(), 350);
  }, duration);
}

// ── Returning customers ────────────────────────────────────────────────────
async function checkReturningCustomers(orders) {
  const phones = [...new Set(orders.map(o => String(o.phone).trim()).filter(Boolean))];
  for (const phone of phones) {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=checkCustomer&phone=${encodeURIComponent(phone)}`);
      const text = await res.text();
      if (text.trim() === "RETURNING") returningCustomers.add(phone);
    } catch(e) {}
  }
}

// ── Time helpers ───────────────────────────────────────────────────────────
function getCurrentTab() {
  const now = new Date();
  const karachi = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Karachi"}));
  return (karachi.getHours() >= 7 && karachi.getHours() < 14) ? "Breakfast Menu" : "Dinner Menu";
}

async function getTodaySheetId() {
  try {
    const res = await fetch(SETTINGS_URL + "&t=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    for (const row of json.table.rows) {
      if (row.c?.[0]?.v && String(row.c[0].v).trim() === "TodaySheetID" && row.c[1]?.v)
        return String(row.c[1].v).trim();
    }
  } catch(e) {}
  return null;
}

// ── Busy mode ──────────────────────────────────────────────────────────────
if (isBusy) applyBusyUI(true);

async function toggleBusy() {
  isBusy = !isBusy;
  localStorage.setItem("kitchenBusy", isBusy);
  applyBusyUI(isBusy);
  try {
    await fetch(`${APPS_SCRIPT_URL}?action=setBusy&value=${isBusy ? "BUSY" : "OPEN"}`, {mode:"no-cors"});
  } catch(e) {}
  showToast(isBusy ? "🚫 Kitchen set to BUSY" : "✅ Kitchen is now OPEN", isBusy ? "error" : "success");
}

function applyBusyUI(busy) {
  const btn = document.getElementById("busyBtn");
  document.getElementById("busyLabel").textContent = busy ? "Busy" : "Open";
  document.getElementById("busy-overlay").classList.toggle("show", busy);
  btn.classList.toggle("busy-on", busy);
}

// ── Fetch orders ───────────────────────────────────────────────────────────
function getCellValue(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return "";
  return String(cell.v);
}

async function fetchOrders() {
  try {
    todaySheetId = await getTodaySheetId();
    if (!todaySheetId) {
      document.getElementById("lastRefresh").textContent = "No daily sheet — check Settings B3";
      return;
    }
    currentTab = getCurrentTab();
    document.getElementById("tabLabel").textContent = currentTab;
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${todaySheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(currentTab)}`;
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^{]*/, "").replace(/[^}]*$/, ""));
    const rows = json.table.rows;

    const orders = rows.map(row => ({
      id:        getCellValue(row.c[0]),
      name:      getCellValue(row.c[1]),
      phone:     getCellValue(row.c[2]),
      type:      getCellValue(row.c[3]),
      address:   getCellValue(row.c[4]),
      items:     getCellValue(row.c[5]),
      status:    getCellValue(row.c[6]),
      timestamp: row.c[7],
      total:     getCellValue(row.c[8]),
      notes:     getCellValue(row.c[9]),
    })).filter(o => o.id && o.name);

    const newOrders = orders.filter(o => o.status === "PENDING" && !knownOrderIds.has(o.id));
    if (!isFirstLoad && newOrders.length > 0) {
      triggerAlert();
      newOrders.forEach(o => showToast(`🔔 New order from ${o.name}`, "default", 5000));
    }
    orders.forEach(o => knownOrderIds.add(o.id));
    allOrders = orders;
    isFirstLoad = false;

    await checkReturningCustomers(orders);
    renderOrders(orders);
    updateStats(orders);
    document.getElementById("lastRefresh").textContent = "Synced " + new Date().toLocaleTimeString("en-PK");
  } catch (err) {
    document.getElementById("lastRefresh").textContent = "Retrying…";
  }
}

// ── Time formatting ────────────────────────────────────────────────────────
function timeAgo(tsObj) {
  if (!tsObj?.v) return "";
  try {
    const match = String(tsObj.v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
    if (!match) return "";
    const d = new Date(+match[1], +match[2], +match[3], +match[4], +match[5], +match[6]);
    const secs = Math.floor((Date.now() - d.getTime()) / 1000);
    if (secs < 60) return secs + "s";
    if (secs < 3600) return Math.floor(secs/60) + "m";
    return Math.floor(secs/3600) + "h";
  } catch { return ""; }
}

function formatTimestamp(tsObj) {
  if (!tsObj?.v) return "";
  try {
    const match = String(tsObj.v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
    if (!match) return "";
    const d = new Date(+match[1], +match[2], +match[3], +match[4], +match[5], +match[6]);
    return d.toLocaleString("en-PK", {day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
  } catch { return ""; }
}

function parseItems(str) {
  if (!str) return [];
  return str.split(",").map(i => i.trim()).filter(Boolean);
}

// ── Print receipt ──────────────────────────────────────────────────────────
function printReceipt(order) {
  const items = parseItems(order.items);
  const timestamp = formatTimestamp(order.timestamp);
  const printWin = window.open("", "_blank", "width=420,height=650");
  printWin.document.write(`<!DOCTYPE html><html><head>
  <title>Receipt — ${order.name}</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:340px;margin:0 auto;padding:20px;color:#000;}
    h2{text-align:center;font-size:22px;margin-bottom:4px;}
    .sub{text-align:center;font-size:11px;color:#666;margin-bottom:16px;}
    .meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:12px;border-bottom:1px dashed #ccc;padding-bottom:8px;}
    .info-box{border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;}
    .info-box div{margin-bottom:3px;}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#888;margin-bottom:6px;}
    table{width:100%;font-size:13px;border-collapse:collapse;}
    td{padding:4px 0;}
    .qty{color:#b45309;font-weight:700;width:32px;}
    .note{background:#fffbeb;border-left:3px solid #f59e0b;padding:6px 10px;font-size:12px;margin:10px 0;border-radius:0 4px 4px 0;}
    .total-bar{border-top:2px solid #000;padding-top:10px;display:flex;justify-content:space-between;align-items:center;}
    .total-bar span:first-child{font-size:14px;font-weight:600;}
    .total-bar span:last-child{font-size:22px;font-weight:700;}
    .footer{text-align:center;margin-top:16px;font-size:11px;color:#888;}
    @media print{body{padding:0;}}
  </style></head><body>
  <h2>MARHABA MAHAL</h2>
  <div class="sub">Official Order Receipt</div>
  <div class="meta"><span><strong>#${order.id}</strong></span><span>${timestamp}</span></div>
  <div class="info-box">
    <div><strong>Customer:</strong> ${order.name}</div>
    <div><strong>Phone:</strong> ${order.phone}</div>
    <div><strong>Type:</strong> ${order.type}</div>
    ${order.address ? `<div><strong>Address:</strong> ${order.address}</div>` : ""}
  </div>
  <div class="section-title">Order Items</div>
  <table>${items.map(item => {
    const p = item.match(/^(\d+x?\s*)(.*)/i);
    return `<tr><td class="qty">${p ? p[1].trim() : ""}</td><td>${p ? p[2] : item}</td></tr>`;
  }).join("")}</table>
  ${order.notes ? `<div class="note"><strong>Note:</strong> ${order.notes}</div>` : ""}
  <div class="total-bar"><span>TOTAL</span><span>PKR ${Number(order.total||0).toLocaleString()}</span></div>
  <div class="footer">Shukriya! Thank you for choosing Marhaba Mahal 🍽️</div>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  printWin.document.close();
}

// ── Render orders ──────────────────────────────────────────────────────────
function renderOrders(orders) {
  const grid = document.getElementById("ordersGrid");
  const sorted = [...orders].sort((a,b) => {
    if (a.status === "PENDING" && b.status !== "PENDING") return -1;
    if (b.status === "PENDING" && a.status !== "PENDING") return 1;
    return 0;
  });

  if (sorted.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><h2>All Caught Up</h2><p>No orders yet. Refreshing every 10 seconds.</p></div>`;
    return;
  }

  grid.innerHTML = sorted.slice(0,20).map((o, idx) => {
    const items = parseItems(o.items);
    const cardClass = o.status === "APPROVED" ? "approved" : o.status === "REJECTED" ? "rejected" : "";
    const isReturning = returningCustomers.has(String(o.phone).trim());
    const delay = idx * 0.06;

    return `
    <div class="order-card ${cardClass}" id="card-${o.id}" style="animation-delay:${delay}s">
      <div class="card-header">
        <span class="order-id">ORDER #${o.id}</span>
        <div class="badges">
          ${isReturning ? '<span class="returning-badge">♻ Returning</span>' : ""}
          ${o.status === "PENDING" ? '<span class="new-badge">New</span>' : ""}
          <span class="type-badge ${o.type === "Delivery" ? "type-delivery" : "type-takeaway"}">${o.type || "Takeaway"}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="customer-row">
          <span class="customer-name">${o.name}</span>
          ${timeAgo(o.timestamp) ? `<span class="time-ago">${timeAgo(o.timestamp)} ago</span>` : ""}
        </div>
        <div class="phone">${o.phone}</div>
        ${o.address ? `<div class="address"><span>📍</span><span>${o.address}</span></div>` : ""}
        <div class="divider"></div>
        <div class="items-label">Items Ordered</div>
        <div class="items-list">
          ${items.map(item => {
            const p = item.match(/^(\d+x?\s*)(.*)/i);
            return p
              ? `<div class="item-row"><span class="item-qty">${p[1].trim()}</span><span>${p[2]}</span></div>`
              : `<div class="item-row"><span>${item}</span></div>`;
          }).join("")}
        </div>
        ${o.notes ? `<div class="notes-row">📝 ${o.notes}</div>` : ""}
        <div class="total-row">
          <span class="total-label">Order Total</span>
          <span class="total-amount">PKR ${Number(o.total||0).toLocaleString()}</span>
        </div>
      </div>
      <div class="card-actions">
        ${o.status === "PENDING" ? `
          <button class="btn btn-approve" onclick="updateStatus('${o.id}', 'APPROVED', this)">✓ Approve</button>
          <button class="btn btn-reject" onclick="updateStatus('${o.id}', 'REJECTED', this)">✕ Reject</button>
        ` : `
          <span class="status-stamp ${o.status === 'APPROVED' ? 'ok' : 'fail'}">
            ${o.status === "APPROVED" ? "✓ Approved & Notified" : "✕ Rejected"}
          </span>
        `}
        <button class="btn btn-print" onclick='printReceipt(${JSON.stringify(o).replace(/'/g,"&#39;")})' title="Print Receipt">🖨️</button>
      </div>
    </div>`;
  }).join("");
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats(orders) {
  const pending  = orders.filter(o => o.status === "PENDING").length;
  const approved = orders.filter(o => o.status === "APPROVED").length;
  const rejected = orders.filter(o => o.status === "REJECTED").length;
  document.getElementById("statPending").textContent  = pending;
  document.getElementById("statApproved").textContent = approved;
  document.getElementById("statRejected").textContent = rejected;
  const badge = document.getElementById("pendingBadge");
  const dot   = document.getElementById("liveDot");
  if (pending > 0) {
    badge.textContent = pending + " pending";
    badge.classList.add("show");
    dot.classList.add("alert");
  } else {
    badge.classList.remove("show");
    dot.classList.remove("alert");
  }
}

// ── Update order status + send WhatsApp ───────────────────────────────────
async function updateStatus(orderId, newStatus, btn) {
  btn.disabled = true;
  btn.textContent = "Sending…";

  const order = allOrders.find(o => o.id === orderId);

  try {
    // Step 1 — update sheet status
    await fetch(`${APPS_SCRIPT_URL}?orderId=${orderId}&status=${newStatus}`, {mode:"no-cors"});

    // Step 2 — send WhatsApp message to customer
    if (order && order.phone) {
      const phone     = String(order.phone).trim();
      const name      = order.name || "Customer";
      const items     = order.items || "";
      const total     = order.total || "";
      const orderType = order.type || "Order";
      const address   = order.address || "";

      let waMessage = "";
      if (newStatus === "APPROVED") {
        waMessage =
          `✅ *Order Confirmed!*\n\n` +
          `Assalam o Alaikum ${name}! 🎉\n\n` +
          `Your order has been *confirmed by our kitchen* and is now being prepared.\n\n` +
          `📦 *Order Details:*\n${items}\n\n` +
          `💰 *Total:* PKR ${Number(total || 0).toLocaleString()}` +
          (orderType === "Delivery" && address ? `\n📍 *Delivery to:* ${address}` : "") +
          `\n\nShukria for choosing *Marhaba Mahal!* 🍽️`;
      } else {
        waMessage =
          `❌ *Order Update*\n\n` +
          `Assalam o Alaikum ${name},\n\n` +
          `We're sorry, but we were unable to process your order at this time.\n\n` +
          `Please call us directly: 📞 *03317319794*\n\n` +
          `We apologize for the inconvenience. Shukriya! 🙏`;
      }

      await fetch(
        `${APPS_SCRIPT_URL}?action=sendWhatsApp` +
        `&phone=${encodeURIComponent(phone)}` +
        `&message=${encodeURIComponent(waMessage)}`,
        {mode: "no-cors"}
      );
    }

    showToast(
      newStatus === "APPROVED"
        ? `✅ Order #${orderId} approved — customer notified`
        : `✕ Order #${orderId} rejected`,
      newStatus === "APPROVED" ? "success" : "error"
    );

    const card = document.getElementById("card-" + orderId);
    if (card) {
      card.style.transition = "opacity 0.4s ease, transform 0.4s ease";
      card.style.transform = "scale(0.98)";
      setTimeout(() => {
        card.classList.add(newStatus === "APPROVED" ? "approved" : "rejected");
        card.style.transform = "";
      }, 300);
    }
    setTimeout(fetchOrders, 2000);
  } catch {
    showToast("⚠️ Could not update — please edit the sheet manually.", "error", 6000);
    btn.disabled = false;
    btn.textContent = newStatus === "APPROVED" ? "✓ Approve" : "✕ Reject";
  }
}

// ── Alert on new order ─────────────────────────────────────────────────────
function triggerAlert() {
  const overlay = document.getElementById("flash-overlay");
  let f = 0;
  const iv = setInterval(() => {
    overlay.classList.toggle("active");
    if (++f >= 8) { clearInterval(iv); overlay.classList.remove("active"); }
  }, 220);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(t => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 660 + t * 60; osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.35);
    });
  } catch(e) {}
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-PK", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

fetchOrders();
setInterval(fetchOrders, 10000);
setInterval(updateClock, 1000);
updateClock();
</script>
